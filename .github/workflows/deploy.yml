# Workflow para desplegar contenido estático en GitHub Pages automáticamente con Vite y React
name: Desplegar a GitHub Pages

on:
  # Se ejecuta cuando se hace push a la rama master o main
  push:
    branches: ["main"]

  # Permite ejecutar este flujo de trabajo manualmente desde la pestaña Actions
  workflow_dispatch:

# Establece los permisos del GITHUB_TOKEN para permitir el despliegue en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente para evitar conflictos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir proyecto
        run: |
          npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefacto de compilación
        uses: actions/upload-pages-artifact@v3
        with:
          # Carpeta de salida por defecto en Vite
          path: './dist'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
